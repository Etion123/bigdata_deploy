# =============================================================================
# bigdata_deploy — Python 3 / install.py
# Target: openEuler 22.03 SP4 / RHEL (dnf).  Supports x86_64 and aarch64.
# =============================================================================

# --- Architecture ---
# Auto-detected from platform.machine(). Override for cross-prep: aarch64 | x86_64
ARCH=""

# --- Install behavior ---
SKIP_IF_INSTALLED="yes"
PREFLIGHT_MIN_FREE_DISK_MB=""

# --- Paths ---
INSTALL_BASE="/usr/local/bigdata"
DOWNLOAD_DIR="${INSTALL_BASE}/downloads"
LOG_DIR="${INSTALL_BASE}/logs"

# --- Cluster (1 + N) ---
CLUSTER_MODE="no"
NODE_ROLE="master"
CLUSTER_MASTER_HOST=""
WORKER_HOSTS=""
MASTER_AS_DATANODE="yes"
HDFS_REPLICATION=""
HBASE_CLUSTER_DISTRIBUTED="yes"
HBASE_MASTER_HOST_IS_REGIONSERVER="yes"
SSH_KEYSCAN_WORKERS="yes"

# --- OS packages (dnf) ---
LOCAL_REPO_FILE=""
LOCAL_REPO_ENABLED="yes"
PKG_PROXY=""

# --- Network ---
HTTP_PROXY=""
HTTPS_PROXY=""
ALL_PROXY=""
NO_PROXY="localhost,127.0.0.1,::1"
OFFLINE_MODE="no"
SKIP_NETWORK_CHECK="no"
NETWORK_CHECK_URL=""
WGET_TRIES="5"
WGET_TIMEOUT="60"

# --- Data disk (optional; destructive) ---
AUTO_MOUNT_DATA_DISK="no"
DATA_DISK_DEVICE=""
DATA_MOUNT_POINT="/data"
DATA_DISK_FSTYPE="xfs"

# --- Runtime user ---
BD_USER="hadoop"
BD_GROUP="hadoop"
BD_HOME=""

# --- Apache mirror ---
APACHE_MIRROR="https://archive.apache.org/dist"

# --- JDK ---
JAVA_USE_SYSTEM="yes"
JAVA_TARBALL_URL=""

# --- Component versions (match Apache tarball names) ---
# Pure Java components work on both x86_64 and aarch64 with the same tarball.
# For native-code components (Hadoop, Spark, Flink) on aarch64, set *_TARBALL_URL
# to point at the arch-specific build if the default tarball lacks native libs.
ZOOKEEPER_VERSION="3.6.2"
HADOOP_VERSION="3.2.0"
HADOOP_TARBALL_URL=""
HIVE_VERSION="3.1.0"
TEZ_VERSION="0.10.0"
TEZ_TARBALL_URL=""
SCALA_VERSION="2.12.13"
SCALA_TARBALL_URL=""
SPARK_VERSION="3.3.1"
SPARK_HADOOP_PROFILE="hadoop3"
SPARK_TARBALL_URL=""
HBASE_VERSION="2.2.3"
HBASE_TARBALL_URL=""
KAFKA_VERSION="2.8.1"
KAFKA_SCALA_VERSION="2.13"
FLINK_VERSION="1.15.0"
FLINK_SCALA_VERSION="2.12"
FLINK_TARBALL_URL=""

# --- SSH ---
CONFIGURE_SSH_LOCALHOST="yes"
SSH_PORT="22"

# --- Ports ---
ZK_CLIENT_PORT="2181"
NN_RPC_PORT="9000"
NN_HTTP_PORT="9870"
RM_WEB_PORT="8088"
HIVE_SERVER2_PORT="10000"
HBASE_REST_PORT="8080"
KAFKA_PORT="9092"
FLINK_JOBMANAGER_RPC_PORT="6123"
FLINK_WEB_PORT="8081"

# --- Hive ---
HIVE_DB_TYPE="derby"
