# Bigdata single-node deploy — read by install.py (Python) and legacy shell scripts
# Target: openEuler 22.03 SP4 (dnf, systemd)
# Offline: OFFLINE_MODE=yes + copy tarballs into INSTALL_BASE/downloads (python3 install.py list-bundles)

# ---------- OS / packages ----------
LOCAL_REPO_FILE=""              # If set, copy this .repo into /etc/yum.repos.d/ (e.g. /path/local-openeuler.repo)
LOCAL_REPO_ENABLED="yes"        # yes: backup default repos and use only local when LOCAL_REPO_FILE set
PKG_PROXY=""                    # Legacy: if HTTP_PROXY empty, treated as HTTP_PROXY (dnf/wget/curl)

# ---------- Network / proxy (outbound downloads & dnf) ----------
# Examples: http://proxy.corp.com:8080  or  http://user:pass@proxy:8080
HTTP_PROXY=""
HTTPS_PROXY=""                  # empty → same as HTTP_PROXY
ALL_PROXY=""                    # optional e.g. socks5://127.0.0.1:1080 (tools that honor ALL_PROXY)
NO_PROXY="localhost,127.0.0.1,::1"

OFFLINE_MODE="no"               # yes: do not require internet; each tarball must already exist under DOWNLOAD_DIR
SKIP_NETWORK_CHECK="no"        # yes: skip outbound probe (wget/curl still use proxy env if set)
NETWORK_CHECK_URL=""           # empty → probe APACHE_MIRROR root (HEAD/GET)
WGET_TRIES="5"
WGET_TIMEOUT="60"

# ---------- Runtime user ----------
BD_USER="hadoop"
BD_GROUP="hadoop"
BD_HOME=""                      # default: /home/${BD_USER}

# ---------- Paths (stack under /usr/local) ----------
INSTALL_BASE="/usr/local/bigdata"
DOWNLOAD_DIR="${INSTALL_BASE}/downloads"
LOG_DIR="${INSTALL_BASE}/logs"

# ---------- Data disk (idle physical disk) ----------
AUTO_MOUNT_DATA_DISK="no"
DATA_DISK_DEVICE=""
DATA_MOUNT_POINT="/data"
DATA_DISK_FSTYPE="xfs"

# ---------- Apache download mirror ----------
APACHE_MIRROR="https://archive.apache.org/dist"

# ---------- Component versions ----------
JAVA_USE_SYSTEM="yes"
JAVA_TARBALL_URL=""

ZOOKEEPER_VERSION="3.6.2"
HADOOP_VERSION="3.2.0"
HIVE_VERSION="3.1.0"
SPARK_VERSION="3.3.1"
SPARK_HADOOP_PROFILE="hadoop3"
HBASE_VERSION="2.2.3"
KAFKA_VERSION="2.8.1"
KAFKA_SCALA_VERSION="2.13"
FLINK_VERSION="1.15.0"
FLINK_SCALA_VERSION="2.12"

# ---------- Network / SSH ----------
CONFIGURE_SSH_LOCALHOST="yes"
SSH_PORT="22"

# ---------- Service ports ----------
ZK_CLIENT_PORT="2181"
NN_RPC_PORT="9000"
NN_HTTP_PORT="9870"
RM_WEB_PORT="8088"
HIVE_SERVER2_PORT="10000"
HBASE_REST_PORT="8080"
KAFKA_PORT="9092"
FLINK_JOBMANAGER_RPC_PORT="6123"
FLINK_WEB_PORT="8081"

# ---------- Hive metastore ----------
HIVE_DB_TYPE="derby"
