# Bigdata single-node deploy — copy or override via environment / second conf file
# Target: openEuler 22.03 SP4 (dnf, systemd)

# ---------- OS / packages ----------
LOCAL_REPO_FILE=""              # If set, copy this .repo into /etc/yum.repos.d/ (e.g. /path/local-openeuler.repo)
LOCAL_REPO_ENABLED="yes"        # yes: backup default repos and use only local when LOCAL_REPO_FILE set
PKG_PROXY=""                    # e.g. http://proxy.example:8080 for dnf (export http_proxy)

# ---------- Runtime user ----------
BD_USER="hadoop"
BD_GROUP="hadoop"
BD_HOME=""                      # default: /home/${BD_USER}

# ---------- Paths ----------
# Software root (tarballs extracted here). If data disk mounted at /data, default uses /data/bigdata
INSTALL_BASE="/data/bigdata"
DOWNLOAD_DIR="${INSTALL_BASE}/downloads"
LOG_DIR="${INSTALL_BASE}/logs"

# ---------- Data disk (idle physical disk) ----------
# If AUTO_MOUNT_DATA_DISK=yes, script picks a candidate (no mounts, no partition table) or uses DATA_DISK_DEVICE
AUTO_MOUNT_DATA_DISK="no"       # set yes only on a fresh disk you are willing to partition
DATA_DISK_DEVICE=""             # e.g. /dev/sdb — overrides auto-detect when set
DATA_MOUNT_POINT="/data"
DATA_DISK_FSTYPE="xfs"          # xfs or ext4

# ---------- Apache download mirror ----------
APACHE_MIRROR="https://archive.apache.org/dist"
# Optional faster mirror, e.g. https://dlcdn.apache.org — some old versions only on archive

# ---------- Component versions (tarball / package semantics) ----------
JAVA_USE_SYSTEM="yes"           # yes: dnf install java-1.8.0-openjdk-devel; no: unpack tarball (set JAVA_TARBALL_URL)
JAVA_TARBALL_URL=""

ZOOKEEPER_VERSION="3.6.2"
HADOOP_VERSION="3.2.0"
HIVE_VERSION="3.1.0"
SPARK_VERSION="3.3.1"
SPARK_HADOOP_PROFILE="hadoop3" # spark-*-bin-${SPARK_HADOOP_PROFILE}.tgz
HBASE_VERSION="2.2.3"
KAFKA_VERSION="2.8.1"
KAFKA_SCALA_VERSION="2.13"      # kafka_${KAFKA_SCALA_VERSION}-${KAFKA_VERSION}.tgz
FLINK_VERSION="1.15.0"            # 1.15.x; bump to e.g. 1.15.4 for newer patches
FLINK_SCALA_VERSION="2.12"      # flink-*-bin-scala_${FLINK_SCALA_VERSION}.tgz

# ---------- Network / SSH ----------
CONFIGURE_SSH_LOCALHOST="yes"   # passwordless ssh to 127.0.0.1 for ${BD_USER}
SSH_PORT="22"

# ---------- Service ports (single node defaults) ----------
ZK_CLIENT_PORT="2181"
NN_RPC_PORT="9000"
NN_HTTP_PORT="9870"
RM_WEB_PORT="8088"
HIVE_SERVER2_PORT="10000"
HBASE_REST_PORT="8080"
KAFKA_PORT="9092"
FLINK_JOBMANAGER_RPC_PORT="6123"
FLINK_WEB_PORT="8081"

# ---------- Hive metastore ----------
HIVE_DB_TYPE="derby"            # derby (embedded, single-node) — no extra DB service
